<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tebak Selera Makanan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
        }

        .main-card {
            border-radius: 15px;
            margin-top: 50px;
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card main-card shadow-lg">
                    <div class="card-body p-4">
                        <h2 id="welcomeMsg" class="fw-bold text-primary mb-4">Selamat Datang!</h2>
                        <p class="text-muted">Lengkapi semua data agar kami bisa menebak seleramu.</p>
                        <hr>

                        <form id="foodForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold">1. Apa rasa favoritmu?</label>
                                <select id="flavor" class="form-select">
                                    <option value="">-- Pilih Rasa --</option>
                                    <option value="Pedas">Pedas</option>
                                    <option value="Manis">Manis</option>
                                    <option value="Asin">Asin/Gurih</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold d-block">2. Pilih tipe hidangan:</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="foodType" id="berat"
                                        value="Makanan Berat">
                                    <label class="form-check-label" for="berat">Makanan Berat</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="foodType" id="cemilan"
                                        value="Cemilan">
                                    <label class="form-check-label" for="cemilan">Cemilan</label>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold d-block">3. Pilih topping idaman (minimal 1):</label>
                                <div class="form-check">
                                    <input class="form-check-input topping" type="checkbox" value="Keju" id="keju">
                                    <label class="form-check-label" for="keju">Keju</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input topping" type="checkbox" value="Cokelat"
                                        id="cokelat">
                                    <label class="form-check-label" for="cokelat">Cokelat</label>
                                </div>
                            </div>

                            <button type="button" onclick="showResult()" class="btn btn-primary w-100 btn-lg">Tebak
                                Sekarang!</button>
                        </form>

                        <div id="result" class="mt-4" style="display:none;">
                            <div class="alert alert-danger border-0 shadow-sm text-center">
                                <p id="summaryText" class="fs-5 fw-bold mb-0"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('currentUser') || "Hani";
        document.getElementById('welcomeMsg').innerText = `Selamat Datang, ${user}!`;

        function showResult() {
            // 1. Validasi Dropdown
            const flavor = document.getElementById('flavor').value;

            // 2. Validasi Radio Button
            const foodType = document.querySelector('input[name="foodType"]:checked');

            // 3. Validasi Checkbox (minimal satu diceklis)
            const toppings = document.querySelectorAll('.topping:checked');

            // Cek apakah ada yang kosong
            if (flavor === "" || !foodType || toppings.length === 0) {
                alert("Eitss! Isi semua data dulu ya, jangan ada yang kosong.");
                document.getElementById('result').style.display = 'none'; // Sembunyikan hasil jika gagal
                return; // Berhenti di sini, jangan lanjut ke bawah
            }

            // Jika semua sudah diisi, baru munculkan ini
            const resultString = "Boleh pinjam seratus?";
            document.getElementById('summaryText').innerText = resultString;
            document.getElementById('result').style.display = 'block';
        }
    </script>

</body>

</html>
