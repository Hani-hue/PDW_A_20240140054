<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Tebak Selera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            border-radius: 20px;
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card shadow-lg">
                    <div class="card-body p-5 text-center">
                        <h3 class="fw-bold mb-3 text-dark">Halo!</h3>
                        <p class="text-muted mb-4">Masukkan namamu untuk lanjut ke tebak selera makanan.</p>

                        <div class="mb-3 text-start">
                            <label for="username" class="form-label fw-semibold">Nama Lengkap</label>
                            <input type="text" id="username" class="form-control form-control-lg"
                                placeholder="Misal: Isna" autocomplete="off">
                            <div id="errorMsg" class="text-danger small mt-2" style="display: none;">
                                Nama tidak boleh kosong ya!
                            </div>
                        </div>

                        <button onclick="login()" class="btn btn-primary btn-lg w-100 shadow-sm">Lanjut</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const userInput = document.getElementById('username');
            const userValue = userInput.value.trim(); // .trim() untuk hapus spasi di awal/akhir
            const errorDisplay = document.getElementById('errorMsg');

            // Validasi: Cek apakah input kosong
            if (userValue === "") {
                // Tampilkan pesan error dan kasih warna merah di border input
                errorDisplay.style.display = 'block';
                userInput.classList.add('is-invalid');

                // Goyangkan input sedikit (efek opsional biar keren)
                userInput.focus();
                return;
            }

            // Jika ada isinya, simpan dan pindah halaman
            localStorage.setItem('currentUser', userValue);
            window.location.href = 'home.html';
        }

        // Hilangkan error saat user mulai mengetik lagi
        document.getElementById('username').addEventListener('input', function () {
            this.classList.remove('is-invalid');
            document.getElementById('errorMsg').style.display = 'none';
        });
    </script>

</body>

</html>
